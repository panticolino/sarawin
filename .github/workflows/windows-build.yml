name: Build Windows (x64)

# Produce un .exe de SARA Libre para Windows 10/11 (64-bit).
# Se ejecuta solo (push a main/master) o a mano desde la pestaña "Actions".
# El resultado queda en Actions > [tu run] > Artifacts > "saralibre-windows-x64".

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # botón "Run workflow" manual

jobs:
  windows-build:
    name: MinGW x64
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}   # todos los pasos corren dentro del shell MSYS2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain + dependencias (todo viene de los repos de MSYS2) ──
      - name: Setup MSYS2 / MinGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-gstreamer
            mingw-w64-x86_64-gst-plugins-base
            mingw-w64-x86_64-gst-plugins-good
            mingw-w64-x86_64-gst-plugins-bad
            mingw-w64-x86_64-gst-plugins-ugly
            mingw-w64-x86_64-gst-libav
            mingw-w64-x86_64-taglib
            mingw-w64-x86_64-spdlog
            mingw-w64-x86_64-tomlplusplus
            mingw-w64-x86_64-ntldd

      # ── Localizar el CMakeLists.txt (raíz del repo o subcarpeta saralibre/) ──
      - name: Detect source dir
        id: src
        run: |
          if [ -f "CMakeLists.txt" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -f "saralibre/CMakeLists.txt" ]; then
            echo "dir=saralibre" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No encuentro CMakeLists.txt en la raíz ni en saralibre/"
            exit 1
          fi

      # ── Configurar y compilar (Release, sin tests) ──
      - name: Configure
        run: >-
          cmake -S "${{ steps.src.outputs.dir }}" -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DSARA_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --parallel

      # ── Empaquetar: exe + DLLs + plugins Qt + plugins GStreamer ──
      - name: Package
        run: bash package-windows.sh build dist-win

      # ── Subir el resultado como artifact descargable ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: saralibre-windows-x64
          path: dist-win/
          if-no-files-found: error

      # ── (Opcional) Adjuntar un .zip a la Release cuando publiques un tag vX.Y.Z ──
      - name: Zip for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist-win && 7z a -tzip ../saralibre-windows-x64.zip . && cd ..

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: saralibre-windows-x64.zip
