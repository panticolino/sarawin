name: Build Windows (x64)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  windows-build:
    name: MinGW x64
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 / MinGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-gstreamer
            mingw-w64-x86_64-gst-plugins-base
            mingw-w64-x86_64-gst-plugins-good
            mingw-w64-x86_64-gst-plugins-bad
            mingw-w64-x86_64-gst-plugins-ugly
            mingw-w64-x86_64-gst-libav
            mingw-w64-x86_64-taglib
            mingw-w64-x86_64-spdlog
            mingw-w64-x86_64-tomlplusplus
            mingw-w64-x86_64-ntldd

      - name: Detect source dir
        id: src
        run: |
          if [ -f "CMakeLists.txt" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -f "saralibre/CMakeLists.txt" ]; then
            echo "dir=saralibre" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No encuentro CMakeLists.txt en la raiz ni en saralibre/"
            exit 1
          fi

      - name: Configure
        run: >-
          cmake -S "${{ steps.src.outputs.dir }}" -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DSARA_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        run: bash package-windows.sh build dist-win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: saralibre-windows-x64
          path: dist-win/
          if-no-files-found: error
